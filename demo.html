<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      label{display: inline-block; width: 80px;}
      input, select{width: 120px;}
    </style>
</head>
<body>
    <label>Name</label> <input id = "Namebox" type="text"><br><br>
    <lable>Rollno</lable> <input id="Rollbox" type = "text"><br><br>
    <label>Section</label> <input id="Secbox" type="text"><br><br>
    <label>Gender</label>
    <select id="Genbox">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select>

    <hr>
    <button id="InsBtn">Insert</button>
    <button id = "SelBtn">Select</button>
    <button id="UpdBtn">Update</button>
    <button id = "DelBtn">Delete</button>

    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-analytics.js";
        // TODO: Add SDKs for Firebase products that you want to use
        // https://firebase.google.com/docs/web/setup#available-libraries
      
        // Your web app's Firebase configuration
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
          apiKey: "AIzaSyDDOUEj5ZXHt_TvN10dbyj5Yg3xX1T5fus",
          authDomain: "demosoftwaretechnology.firebaseapp.com",
          databaseURL: "https://demosoftwaretechnology-default-rtdb.firebaseio.com",
          projectId: "demosoftwaretechnology",
          storageBucket: "demosoftwaretechnology.appspot.com",
          messagingSenderId: "375046175781",
          appId: "1:375046175781:web:0d1bfac1b8ca71234293cc",
          measurementId: "G-120GXQ1F6L"
        };
      
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);

        import{getDatabase, ref, get, set, child, update, remove}
        from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js"
        
        const db=getDatabase();

        //****************************** Elements ************************************
        var namebox=document.getElementById("Namebox")
        var rollbox=document.getElementById("Rollbox")
        var secbox=document.getElementById("Secbox")
        var genbox=document.getElementById("Genbox")

        var insBtn = document.getElementById("InsBtn")
        var selBtn = document.getElementById("SelBtn")
        var updBtn = document.getElementById("UpdBtn")
        var delBnt = document.getElementById("DelBtn")

        //******************************* Insert data function ****************************
        function InsertData(){
          set(ref(db, "TheStudents/" + rollbox.value), {
            NameOfStd: namebox.value,
            RollNo: rollbox.value,
            Section: secbox.value,
            Gender: genbox.value
          })
          .then(()=>{
            alert("data stored successfully");
          })
          .catch((error)=>{
            alert("unsuccessful, error"+error);
          });
        }

        //********************** select data function ************************
        function SelectData(){
          const dbref=ref(db);
          get(child(dbref, "TheStudents/"+ rollbox.value)).then((snapshot)=>{
            if(snapshot.exists()){
              namebox.value=snapshot.val().NameOfStd;
              secbox.value=snapshot.val().Section;
              genbox.value=snapshot.val().Gender;
            }
            else{
              alert("No data found");
            }
          })
          .catch((error)=>{
            alert("unsuccessful, error"+error);
          });
        }

        //******************** Update data ********************
        function UpdateData(){
          update(ref(db, "TheStudents/" + rollbox.value), {
            NameOfStd: namebox.value,
            Section: secbox.value,
            Gender: genbox.value
          })
          .then(()=>{
            alert("data stored successfully");
          })
          .catch((error)=>{
            alert("unsuccessful, error"+error);
          });
        }

        //********************** delete data *************************
        function DeleteData(){
          remove(ref(db, "TheStudents/" + rollbox.value))
          .then(()=>{
            alert("data removed successfully");
          })
          .catch((error)=>{
            alert("unsuccessful, error"+error);
          });
        }

        //******************** Assign Events to btns **********************
        insBtn.addEventListener('click', InsertData);
        selBtn.addEventListener('click', SelectData);
        updBtn.addEventListener('click', UpdateData);
        delBnt.addEventListener('click', DeleteData);

      </script>
</body>
</html>
